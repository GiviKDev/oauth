---
name: Feature Request
description: Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - GiviKDev.OAuth
        - GiviKDev.OAuth.Mcp
        - GiviKDev.OAuth.Entra
        - New package
    validations:
      required: true
